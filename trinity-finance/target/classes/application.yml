server:
  port: 8097

spring:
  application:
    name: trinity-finance
  config:
    import: nacos:trinity-finance.yaml
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev
      config:
        server-addr: 127.0.0.1:8848
        namespace: dev
        file-extension: yaml
        refresh-enabled: true

logging:
  level:
    com.trinity: DEBUG
