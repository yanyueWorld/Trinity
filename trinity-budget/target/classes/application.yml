server:
  port: 8093

spring:
  application:
    name: trinity-budget
  config:
    import: nacos:trinity-budget.yaml
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev
      config:
        server-addr: 127.0.0.1:8848
        namespace: dev
        file-extension: yaml
        refresh-enabled: true

logging:
  level:
    com.trinity: DEBUG
